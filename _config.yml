backend:
  name: github
  repo: agrawalvidhi/vidhiagrawal-site
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "resources"
    label: "Resources"
    description: "Articles, videos and tools worth sharing"
    files:
      - name: "resources"
        label: "All Resources"
        file: "_data/resources.yml"
        fields:
          - name: items
            label: Resources
            widget: list
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - label: "Category"
                name: "category"
                widget: "select"
                options:
                  - { label: "Article", value: "articles" }
                  - { label: "Video", value: "videos" }
                  - { label: "Tool", value: "tools" }
              - { label: "Tag (e.g. Fintech, Psychology)", name: "tag", widget: "string" }
              - label: "Tag Colour"
                name: "tagColor"
                widget: "select"
                options:
                  - { label: "Green", value: "green" }
                  - { label: "Orange", value: "orange" }
                  - { label: "Blue", value: "blue" }
                  - { label: "Purple", value: "purple" }
                  - { label: "Red", value: "red" }
                  - { label: "Teal", value: "teal" }
              - { label: "Source (e.g. TED, HBR)", name: "source", widget: "string", required: false }
              - { label: "Your note about this", name: "note", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
              - label: "Icon"
                name: "icon"
                widget: "select"
                options:
                  - { label: "Article 📄", value: "📄" }
                  - { label: "Video ▶️", value: "▶️" }
                  - { label: "Tool 🛠️", value: "🛠️" }

  - name: "courses"
    label: "Courses"
    description: "Your learning log"
    files:
      - name: "courses"
        label: "All Courses"
        file: "_data/courses.yml"
        fields:
          - name: items
            label: Courses
            widget: list
            fields:
              - { label: "Course Name", name: "name", widget: "string" }
              - { label: "Platform / Instructor", name: "by", widget: "string" }
              - label: "Status"
                name: "status"
                widget: "select"
                options:
                  - { label: "Completed", value: "Completed" }
                  - { label: "In Progress", value: "In progress" }
                  - { label: "Exploring", value: "Exploring" }
